name: Deploy MkDocs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          # Yahan se cache wali line hata di gayi hai taaki error na aaye

      - name: 📦 Install MkDocs Material & Plugins
        run: pip install mkdocs-material mkdocs-awesome-pages-plugin

      # --- 🛡️ Dr. Sandeep's Bulletproof Link Scanner ---
      - name: 🔗 Scan for Broken Links (Lychee)
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: --verbose --no-progress './docs/**/*.md' './docs/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      # --- 🚀 Strict Deployment ---
      - name: 🌐 Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --strict
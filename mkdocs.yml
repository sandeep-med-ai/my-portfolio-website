site_name: Dr. Sandeep Blog
site_url: https://drsandeep.allhelp.in/

theme:
  name: material

plugins:
  - search
  - awesome-pages

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - meta          
  - attr_list     
  - md_in_html    
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format